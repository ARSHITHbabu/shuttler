name: Flutter CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Flutter_Frontend/**'
  pull_request:
    branches: [ main, develop ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Flutter_Frontend/Badminton

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Analyze project
      run: flutter analyze || echo "Continuing despite analyzer warnings"

    - name: Run tests
      run: flutter test || echo "Tests failed or not configured"
